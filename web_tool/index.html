<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cimory SIAP - Multi-Store Tool V2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet JS (Maps) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a9eff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('[PWA] SW registered:', reg.scope))
                .catch(err => console.log('[PWA] SW failed:', err));
        }
    </script>
    <div class="app-container">
        <!-- Fixed Header -->
        <header class="app-header">
            <div class="header-top">
                <div class="header-left">
                    <img src="icons/logo.png" alt="Logo" class="app-logo">
                    <div class="header-text">
                        <h1 class="app-title">CIMORY SIAP <span class="version-badge">V2</span></h1>
                        <p class="app-subtitle">Batch Visit Processor</p>
                    </div>
                </div>
                <div class="header-right">
                    <input type="file" id="file-input" accept=".json, text/plain" style="display: none;">
                    <button class="btn-secondary btn-icon-only" onclick="document.getElementById('file-input').click()" title="Load JSON Backup">
                        <span class="btn-icon">📁</span>
                    </button>
                    <button class="btn-primary" onclick="loadDailyRKM()" id="btn-load-daily">
                        <span class="btn-icon">🔄</span> <span class="mobile-hidden">Load</span>
                    </button>
                </div>
            </div>
            <div id="daily-status" class="header-status hidden"></div>
        </header>

        <!-- Scrollable Main Content -->
        <main class="app-main custom-scrollbar">
            <div id="stores-container" class="stores-container hidden">
                <!-- Store cards will be dynamically generated here -->
            </div>
        </main>

        <!-- Fixed Footer -->
        <footer class="app-footer">
            <div class="footer-left">
                <span class="stores-count" id="stores-count">Ready: 0/0</span>
                <div id="upload-progress" class="upload-status-footer hidden"></div>
            </div>
            <div class="footer-right">
                <button class="btn-success btn-large" id="btn-upload">
                    <span class="btn-icon">🚀</span> Upload to Server
                </button>
            </div>
        </footer>
    </div>

    <!-- ===== CHECKOUT CONFIRMATION MODAL ===== -->
    <div id="checkout-modal" class="modal-overlay hidden" onclick="handleModalOverlayClick(event)">
        <div class="modal-container">
            <div class="modal-header">
                <div>
                    <div class="modal-title">🔍 Konfirmasi Check-Out</div>
                    <div class="modal-store-name" id="modal-store-name"></div>
                </div>
                <button class="modal-close-btn" onclick="cancelCheckout()">✕</button>
            </div>
            <div id="checkout-modal-map" class="checkout-modal-map"></div>
            <div class="modal-body">
                <div class="modal-summary-row">
                    <div class="modal-summary-item">
                        <span class="modal-summary-label">📍 GPS</span>
                        <span class="modal-summary-value" id="modal-gps-val">—</span>
                    </div>
                    <div class="modal-summary-item">
                        <span class="modal-summary-label">🕐 Check In</span>
                        <span class="modal-summary-value checkin-color" id="modal-checkin-val">—</span>
                    </div>
                    <div class="modal-summary-item">
                        <span class="modal-summary-label">🕑 Check Out</span>
                        <span class="modal-summary-value checkout-color" id="modal-checkout-val">—</span>
                    </div>
                    <div class="modal-summary-item">
                        <span class="modal-summary-label">⏱ Durasi</span>
                        <span class="modal-summary-value" id="modal-duration-val">—</span>
                    </div>
                </div>
                <div class="modal-stock-section">
                    <div class="modal-stock-title" id="modal-stock-title">📦 Stok Kosong</div>
                    <div class="modal-stock-list" id="modal-stock-list"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn-cancel" onclick="cancelCheckout()">❌ Batal</button>
                <button class="modal-btn-confirm" onclick="confirmCheckout()">✅ Simpan</button>
            </div>
        </div>
    </div>

    <!-- Upload Result Modal -->
    <div id="upload-modal" class="modal-overlay hidden">
        <div class="upload-modal-content">
            <div id="upload-modal-icon" class="upload-modal-icon"></div>
            <h3 id="upload-modal-title" class="upload-modal-title">Mantap!</h3>
            <p id="upload-modal-message" class="upload-modal-msg">X Toko berhasil di-upload.</p>
            <button class="btn-primary" style="margin-top: 24px; width: 100%; border-radius: 20px; font-weight: 600;" onclick="closeUploadModal()">OKE, TUTUP</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="photo_utils.js"></script>
    <script src="app.js"></script>
</body>
</html>
